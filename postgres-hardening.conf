# PostgreSQL Security Hardening Configuration for BlindKey/OpenClaw
# This file is mounted read-only into the container

# Connection Security
password_encryption = scram-sha-256
ssl = off
# Note: Enable SSL in production with proper certificates:
# ssl = on
# ssl_cert_file = '/etc/ssl/certs/server.crt'
# ssl_key_file = '/etc/ssl/private/server.key'
# ssl_min_protocol_version = 'TLSv1.3'

# Logging - Comprehensive audit trail
log_destination = 'stderr'
logging_collector = off
log_statement = 'all'
log_duration = on
log_connections = on
log_disconnections = on
log_hostname = off
log_line_prefix = '%t [%p]: user=%u,db=%d,app=%a,client=%h '

# Connection limits
max_connections = 50
superuser_reserved_connections = 3

# Memory (conservative for container)
shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 64MB

# Query timeouts
statement_timeout = 30000
lock_timeout = 10000
idle_in_transaction_session_timeout = 60000

# Prevent information leakage
log_min_error_statement = error
client_min_messages = error

# Row-level security
row_security = on
